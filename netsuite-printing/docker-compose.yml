version: '3.8'

services: 
 nginx:
    image: nginx:alpine  # Use the official NGINX image
    container_name: netsuite-nginx
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf # Mount the custom NGINX config
    ports:
      - "1000:1000"  # Expose port 5003 on the host, forwarding to port 5003 on the container